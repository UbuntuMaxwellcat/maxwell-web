<style> /*animation*/
@keyframes fadeInLeft {
        0% {
            opacity: 0;
            transform: translateX(-50px);
        }
        100% {
            opacity: 1;
            transform: translateX(0);
        }
}
@keyframes fadeIn {
        0% {
            opacity: 0;
            
        }
        100% {
            opacity: 1;
        }
}
@keyframes fadeOut {
        0% {
            opacity: 1;
            
        }
        100% {
            opacity: 0;
        }
}
@keyframes fadeIndown {
        0% {
            opacity: 0;
            transform: translateY(-50px);
        }
        100% {
            opacity: 1;
            transform: translateY(0);
}
</style>
